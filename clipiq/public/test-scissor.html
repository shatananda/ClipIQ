<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Scissors Logo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 60px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    .logo-box {
      background: linear-gradient(135deg, #f0f5ff 0%, #e8ecff 100%);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 30px;
    }
    img {
      width: 300px;
      height: 300px;
    }
    p {
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClipIQ Scissors Logo</h1>
    <div class="logo-box">
      <img src="/clipiq-icon.jpg" alt="ClipIQ Scissors Logo">
    </div>
    <p>Film reels on left and right with scissors in the center cutting the film.</p>
  </div>
</body>
</html>
