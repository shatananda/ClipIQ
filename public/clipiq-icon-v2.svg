<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clipGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b6cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d4fb8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#clipGradient2)" stroke-width="1" opacity="0.2"/>

  <!-- Main play button shape -->
  <g>
    <!-- Large play triangle -->
    <polygon points="80,60 80,140 140,100" fill="url(#clipGradient2)" opacity="0.15"/>

    <!-- Play triangle outline -->
    <polygon points="80,60 80,140 140,100" fill="none" stroke="url(#clipGradient2)" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Film strip elements layered -->
  <!-- Top left film frame -->
  <g opacity="0.8">
    <rect x="35" y="35" width="22" height="22" fill="none" stroke="url(#clipGradient2)" stroke-width="1.5" rx="2"/>
    <circle cx="38" cy="38" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="50" cy="38" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="38" cy="50" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="50" cy="50" r="1.5" fill="url(#clipGradient2)"/>
  </g>

  <!-- Top right film frame -->
  <g opacity="0.7">
    <rect x="143" y="35" width="22" height="22" fill="none" stroke="url(#clipGradient2)" stroke-width="1.5" rx="2"/>
    <circle cx="146" cy="38" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="158" cy="38" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="146" cy="50" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="158" cy="50" r="1.5" fill="url(#clipGradient2)"/>
  </g>

  <!-- Bottom left film frame -->
  <g opacity="0.7">
    <rect x="35" y="143" width="22" height="22" fill="none" stroke="url(#clipGradient2)" stroke-width="1.5" rx="2"/>
    <circle cx="38" cy="146" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="50" cy="146" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="38" cy="158" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="50" cy="158" r="1.5" fill="url(#clipGradient2)"/>
  </g>

  <!-- Bottom right film frame -->
  <g opacity="0.6">
    <rect x="143" y="143" width="22" height="22" fill="none" stroke="url(#clipGradient2)" stroke-width="1.5" rx="2"/>
    <circle cx="146" cy="146" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="158" cy="146" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="146" cy="158" r="1.5" fill="url(#clipGradient2)"/>
    <circle cx="158" cy="158" r="1.5" fill="url(#clipGradient2)"/>
  </g>

  <!-- Connecting lines (film strip) -->
  <line x1="57" y1="46" x2="143" y2="46" stroke="url(#clipGradient2)" stroke-width="1" opacity="0.4"/>
  <line x1="57" y1="154" x2="143" y2="154" stroke="url(#clipGradient2)" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="65" x2="46" y2="135" stroke="url(#clipGradient2)" stroke-width="1" opacity="0.4"/>
  <line x1="154" y1="65" x2="154" y2="135" stroke="url(#clipGradient2)" stroke-width="1" opacity="0.4"/>
</svg>
